<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Молитвы у икон { k }</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #faf7f2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            line-height: 1.5;
            color: #2e2a27;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        h1 {
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 350;
            text-align: center;
            color: #5d4a3a;
            margin-bottom: 36px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0d6cc;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: -0.01em;
        }

        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .prayer-item {
            background: #ffffff;
            border: 1px solid #e6ded5;
            border-radius: 32px;
            padding: 28px 32px;
            box-shadow: 0 4px 12px rgba(110, 80, 60, 0.05);
            font-size: clamp(1.3rem, 5.5vw, 1.8rem);
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #3a2f28;
            line-height: 1.6;
            transition: all 0.1s ease;
            word-break: break-word;
            text-align: center;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        .prayer-item:active {
            background: #f5f0ea;
            transform: scale(0.99);
        }

        @media (hover: hover) {
            .prayer-item:hover {
                border-color: #cbb9a8;
                box-shadow: 0 8px 18px -6px rgba(100, 70, 45, 0.12);
            }
        }

        .footer {
            margin-top: 48px;
            text-align: center;
            font-size: 0.9rem;
            color: #ab9a8a;
            padding-top: 24px;
            border-top: 1px solid #e8dfd6;
        }

        .small-note {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #9b8b7c;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{ k } Молитвы для храма и церкви { k }</h1>

        <div class="prayer-list">
            {% for mol in molitva %}
                <div class="prayer-item">{{ mol }}</div>
            {% endfor %}
        </div>

        <div class="small-note">
            {{ molitva|length }} молитва(ы)
        </div>

        <div class="footer">
            <span>{ k } Господи, Иисусе Христе, помилуй мя{ k }</span>
        </div>
    </div>
</body>
</html>
